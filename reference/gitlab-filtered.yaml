swagger: '2.0'
info:
  title: GitLab API
  version: v4
host: gitlab.com
produces:
  - application/json
securityDefinitions:
  access_token_header:
    type: apiKey
    name: PRIVATE-TOKEN
    in: header
  access_token_query:
    type: apiKey
    name: private_token
    in: query
paths:
  /api/v4/groups/{id}/access_requests:
    get:
      summary: Gets a list of access requests for a group.
      description: This feature was introduced in GitLab 8.11.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user
          type: string
          required: true
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Gets a list of access requests for a group.
          schema:
            $ref: '#/definitions/API_Entities_AccessRequester'
      tags:
        - access_requests
      operationId: getApiV4GroupsIdAccessRequests
    post:
      summary: Requests access for the authenticated user to a group.
      description: This feature was introduced in GitLab 8.11.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user
          type: string
          required: true
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/API_Entities_AccessRequester'
          examples:
            successfull_response:
              id: 1
              username: raymond_smith
              name: Raymond Smith
              state: active
              created_at: '2012-10-22T14:13:35Z'
              access_level: 20
      tags:
        - access_requests
      operationId: postApiV4GroupsIdAccessRequests
  /api/v4/groups/{id}/access_requests/{user_id}/approve:
    put:
      summary: Approves an access request for the given user.
      description: This feature was introduced in GitLab 8.11.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user
          type: string
          required: true
        - in: path
          name: user_id
          description: The user ID of the access requester
          type: integer
          format: int32
          required: true
        - name: putApiV4GroupsIdAccessRequestsUserIdApprove
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4GroupsIdAccessRequestsUserIdApprove'
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/API_Entities_AccessRequester'
          examples:
            successfull_response:
              id: 1
              username: raymond_smith
              name: Raymond Smith
              state: active
              created_at: '2012-10-22T14:13:35Z'
              access_level: 20
      tags:
        - access_requests
      operationId: putApiV4GroupsIdAccessRequestsUserIdApprove
  /api/v4/groups/{id}/access_requests/{user_id}:
    delete:
      summary: Denies an access request for the given user.
      description: This feature was introduced in GitLab 8.11.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user
          type: string
          required: true
        - in: path
          name: user_id
          description: The user ID of the access requester
          type: integer
          format: int32
          required: true
      responses:
        '204':
          description: Denies an access request for the given user.
      tags:
        - access_requests
      operationId: deleteApiV4GroupsIdAccessRequestsUserId
  /api/v4/groups/{id}/epics/{epic_iid}/award_emoji:
    get:
      summary: List an awardable's emoji reactions for groups
      description: Get a list of all emoji reactions for a specified awardable. This feature was introduced in 8.9
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group
          type: string
          required: true
        - in: path
          name: epic_iid
          description: ID (`iid` for merge requests/issues/epics, `id` for snippets) of an awardable.
          type: integer
          format: int32
          required: true
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: List an awardable's emoji reactions for groups
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_AwardEmoji'
        '404':
          description: Not Found
      tags:
        - award_emoji
      operationId: getApiV4GroupsIdEpicsEpicIidAwardEmoji
    post:
      summary: Add a new emoji reaction
      description: Add an emoji reaction on the specified awardable. This feature was introduced in 8.9
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - in: path
          name: epic_iid
          type: integer
          format: int32
          required: true
        - name: postApiV4GroupsIdEpicsEpicIidAwardEmoji
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4GroupsIdEpicsEpicIidAwardEmoji'
      responses:
        '201':
          description: Add a new emoji reaction
          schema:
            $ref: '#/definitions/API_Entities_AwardEmoji'
        '400':
          description: Bad Request
        '404':
          description: Not Found
      tags:
        - award_emoji
      operationId: postApiV4GroupsIdEpicsEpicIidAwardEmoji
  /api/v4/groups/{id}/epics/{epic_iid}/award_emoji/{award_id}:
    get:
      summary: Get a single emoji reaction
      description: Get a single emoji reaction from an issue, snippet, or merge request. This feature was introduced in 8.9
      produces:
        - application/json
      parameters:
        - in: path
          name: award_id
          description: ID of the emoji reaction.
          type: integer
          format: int32
          required: true
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - in: path
          name: epic_iid
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Get a single emoji reaction
          schema:
            $ref: '#/definitions/API_Entities_AwardEmoji'
        '404':
          description: Not Found
      tags:
        - award_emoji
      operationId: getApiV4GroupsIdEpicsEpicIidAwardEmojiAwardId
    delete:
      summary: Delete an emoji reaction
      description: >-
        Only an administrator or the author of the reaction can delete an emoji reaction. This feature was introduced in
        8.9
      produces:
        - application/json
      parameters:
        - in: path
          name: award_id
          description: ID of an emoji reaction.
          type: integer
          format: int32
          required: true
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - in: path
          name: epic_iid
          type: integer
          format: int32
          required: true
      responses:
        '204':
          description: Delete an emoji reaction
        '401':
          description: Unauthorized
        '404':
          description: Not Found
      tags:
        - award_emoji
      operationId: deleteApiV4GroupsIdEpicsEpicIidAwardEmojiAwardId
  /api/v4/groups/{id}/epics/{epic_iid}/notes/{note_id}/award_emoji:
    get:
      summary: List an awardable's emoji reactions for groups
