          name: package_type
          description: Return packages of a certain type
          type: string
          enum:
            - maven
            - npm
            - conan
            - nuget
            - pypi
            - composer
            - generic
            - golang
            - debian
            - rubygems
            - helm
            - terraform_module
            - rpm
            - ml_model
            - cargo
          required: false
        - in: query
          name: package_name
          description: Return packages with this name
          type: string
          required: false
        - in: query
          name: package_version
          description: Return packages with this version
          type: string
          required: false
        - in: query
          name: include_versionless
          description: Returns packages without a version
          type: boolean
          required: false
        - in: query
          name: status
          description: Return packages with specified status
          type: string
          enum:
