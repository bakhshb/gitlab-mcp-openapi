  /api/v4/projects/{id}/ci/lint:
    get:
      summary: Validates a CI YAML configuration with a namespace
      description: |-
        Checks if a project’s .gitlab-ci.yml configuration in a given commit (by default HEAD of the
                project’s default branch) is valid
      produces:
        - application/json
      parameters:
        - in: query
          name: sha
          description: 'Deprecated: Use content_ref instead'
          type: string
          required: false
        - in: query
          name: content_ref
          description: >-
            The CI/CD configuration content is taken from this commit SHA, branch or tag. Defaults to the HEAD of the
            project's default branch
          type: string
          required: false
        - in: query
          name: dry_run
          description: Run pipeline creation simulation, or only do static check. This is false by default
          type: boolean
          default: false
          required: false
        - in: query
          name: include_jobs
          description: |-
            If the list of jobs that would exist in a static check or pipeline
                    simulation should be included in the response. This is false by default
          type: boolean
          required: false
        - in: query
          name: ref
          description: 'Deprecated: Use dry_run_ref instead'
          type: string
          required: false
        - in: query
          name: dry_run_ref
          description: >-
            Branch or tag used as context when executing a dry run. Defaults to the default branch of the project. Only
            used when dry_run is true
          type: string
          required: false
        - in: path
          name: id
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Validates a CI YAML configuration with a namespace
          schema:
            $ref: '#/definitions/API_Entities_Ci_Lint_Result'
        '404':
          description: Not found
      tags:
        - ci_lint
      operationId: getApiV4ProjectsIdCiLint
    post:
      summary: Validate a CI YAML configuration with a namespace
      description: Checks if CI/CD YAML configuration is valid. This endpoint has namespace specific context
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - name: postApiV4ProjectsIdCiLint
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4ProjectsIdCiLint'
      responses:
        '200':
          description: Validate a CI YAML configuration with a namespace
          schema:
            $ref: '#/definitions/API_Entities_Ci_Lint_Result'
      tags:
        - ci_lint
      operationId: postApiV4ProjectsIdCiLint
