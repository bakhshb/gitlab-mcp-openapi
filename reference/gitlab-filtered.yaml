          enum:
            - asc
            - desc
          required: false
        - in: query
          name: package_type
          description: Return packages of a certain type
          type: string
          enum:
            - maven
            - npm
            - conan
            - nuget
            - pypi
            - composer
            - generic
            - golang
            - debian
            - rubygems
            - helm
            - terraform_module
