      tags:
        - award_emoji
      operationId: getApiV4GroupsIdEpicsEpicIidNotesNoteIdAwardEmojiAwardId
    delete:
      summary: Delete an emoji reaction
      description: >-
        Only an administrator or the author of the reaction can delete an emoji reaction. This feature was introduced in
        8.9
      produces:
        - application/json
      parameters:
        - in: path
          name: award_id
          description: ID of an emoji reaction.
          type: integer
          format: int32
          required: true
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - in: path
          name: epic_iid
          type: integer
          format: int32
          required: true
        - in: path
          name: note_id
          type: integer
          format: int32
          required: true
      responses:
        '204':
          description: Delete an emoji reaction
        '401':
          description: Unauthorized
        '404':
          description: Not Found
      tags:
        - award_emoji
      operationId: deleteApiV4GroupsIdEpicsEpicIidNotesNoteIdAwardEmojiAwardId
  /api/v4/groups/{id}/badges:
    get:
      summary: Gets a list of group badges viewable by the authenticated user.
      description: This feature was introduced in GitLab 10.6.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user.
          type: string
          required: true
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: name
          description: Name for the badge
          type: string
          required: false
      responses:
        '200':
          description: Gets a list of group badges viewable by the authenticated user.
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Badge'
      tags:
        - badges
      operationId: getApiV4GroupsIdBadges
    post:
      summary: Adds a badge to a group.
      description: This feature was introduced in GitLab 10.6.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user.
          type: string
          required: true
        - name: postApiV4GroupsIdBadges
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4GroupsIdBadges'
      responses:
        '201':
          description: Adds a badge to a group.
          schema:
            $ref: '#/definitions/API_Entities_Badge'
      tags:
        - badges
      operationId: postApiV4GroupsIdBadges
  /api/v4/groups/{id}/badges/render:
    get:
      summary: Preview a badge from a group.
      description: This feature was introduced in GitLab 10.6.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user.
          type: string
          required: true
        - in: query
          name: link_url
          description: URL of the badge link
          type: string
          required: true
        - in: query
          name: image_url
          description: URL of the badge image
          type: string
          required: true
      responses:
        '200':
          description: Preview a badge from a group.
          schema:
            $ref: '#/definitions/API_Entities_BasicBadgeDetails'
      tags:
        - badges
      operationId: getApiV4GroupsIdBadgesRender
  /api/v4/groups/{id}/badges/{badge_id}:
    get:
      summary: Gets a badge of a group.
      description: This feature was introduced in GitLab 10.6.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user.
          type: string
          required: true
        - in: path
          name: badge_id
          description: The badge ID
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Gets a badge of a group.
          schema:
            $ref: '#/definitions/API_Entities_Badge'
      tags:
        - badges
      operationId: getApiV4GroupsIdBadgesBadgeId
    put:
      summary: Updates a badge of a group.
      description: This feature was introduced in GitLab 10.6.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user.
          type: string
          required: true
        - in: path
          name: badge_id
          type: integer
          format: int32
          required: true
        - name: putApiV4GroupsIdBadgesBadgeId
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4GroupsIdBadgesBadgeId'
      responses:
        '200':
          description: Updates a badge of a group.
          schema:
            $ref: '#/definitions/API_Entities_Badge'
      tags:
        - badges
      operationId: putApiV4GroupsIdBadgesBadgeId
    delete:
      summary: Removes a badge from the group.
      description: This feature was introduced in GitLab 10.6.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the group owned by the authenticated user.
          type: string
          required: true
        - in: path
          name: badge_id
          description: The badge ID
          type: integer
          format: int32
          required: true
      responses:
        '204':
          description: Removes a badge from the group.
      tags:
        - badges
      operationId: deleteApiV4GroupsIdBadgesBadgeId
  /api/v4/groups/{id}/custom_attributes:
    get:
      description: Get all custom attributes on a group
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Get all custom attributes on a group
          schema:
            $ref: '#/definitions/API_Entities_CustomAttribute'
      tags:
        - custom_attributes
      operationId: getApiV4GroupsIdCustomAttributes
  /api/v4/groups/{id}/custom_attributes/{key}:
    get:
      description: Get a custom attribute on a group
      produces:
        - application/json
      parameters:
        - in: path
          name: key
          description: The key of the custom attribute
          type: string
          required: true
        - in: path
          name: id
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Get a custom attribute on a group
          schema:
            $ref: '#/definitions/API_Entities_CustomAttribute'
      tags:
        - custom_attributes
      operationId: getApiV4GroupsIdCustomAttributesKey
    put:
      description: Set a custom attribute on a group
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: key
          description: The key of the custom attribute
          type: string
          required: true
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - name: putApiV4GroupsIdCustomAttributesKey
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4GroupsIdCustomAttributesKey'
      responses:
        '200':
          description: Set a custom attribute on a group
          schema:
            $ref: '#/definitions/API_Entities_CustomAttribute'
      tags:
        - custom_attributes
      operationId: putApiV4GroupsIdCustomAttributesKey
    delete:
      description: Delete a custom attribute on a group
      produces:
        - application/json
      parameters:
        - in: path
          name: key
          description: The key of the custom attribute
          type: string
          required: true
        - in: path
          name: id
          type: integer
          format: int32
          required: true
      responses:
        '204':
          description: Delete a custom attribute on a group
      tags:
        - custom_attributes
      operationId: deleteApiV4GroupsIdCustomAttributesKey
  /api/v4/groups:
    get:
      description: Get a groups list
      produces:
        - application/json
      parameters:
        - in: query
          name: statistics
          description: Include project statistics
          type: boolean
          default: false
          required: false
        - in: query
          name: archived
          description: Limit by archived status
          type: boolean
          required: false
        - in: query
          name: skip_groups
          description: Array of group ids to exclude from list
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: all_available
          description: When `true`, returns all accessible groups. When `false`, returns only groups where the user is a member.
          type: boolean
          required: false
        - in: query
          name: visibility
          description: Limit by visibility
          type: string
          enum:
            - private
            - internal
            - public
          required: false
        - in: query
          name: search
          description: Search for a specific group
          type: string
          required: false
        - in: query
          name: owned
          description: Limit by owned by authenticated user
          type: boolean
          default: false
          required: false
        - in: query
          name: order_by
          description: Order by name, path, id or similarity if searching
          type: string
          default: name
          enum:
            - name
            - path
            - id
            - similarity
          required: false
        - in: query
          name: sort
          description: Sort by asc (ascending) or desc (descending)
          type: string
          default: asc
          enum:
            - asc
            - desc
          required: false
        - in: query
          name: min_access_level
          description: Minimum access level of authenticated user
          type: integer
          format: int32
          enum:
            - 10
            - 15
            - 20
            - 30
            - 40
            - 50
          required: false
        - in: query
          name: top_level_only
          description: Only include top-level groups
          type: boolean
          required: false
        - in: query
          name: marked_for_deletion_on
          description: Return groups that are marked for deletion on this date
          type: string
          format: date
          required: false
        - in: query
          name: active
          description: Limit by groups that are not archived and not marked for deletion
          type: boolean
          required: false
        - in: query
          name: repository_storage
          description: Filter by repository storage used by the group
          type: string
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: with_custom_attributes
          description: Include custom attributes in the response
          type: boolean
          default: false
          required: false
      responses:
        '200':
          description: Get a groups list
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Group'
      tags:
        - groups
      operationId: getApiV4Groups
    post:
      description: Create a group. Available only for users who can create groups.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - name: postApiV4Groups
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4Groups'
      responses:
        '201':
          description: Create a group. Available only for users who can create groups.
          schema:
            $ref: '#/definitions/API_Entities_Group'
      tags:
        - groups
      operationId: postApiV4Groups
  /api/v4/groups/{id}:
    put:
      description: Update a group. Available only for users who can administrate groups.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of a group
          type: string
          required: true
        - name: putApiV4GroupsId
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4GroupsId'
      responses:
        '200':
          description: Update a group. Available only for users who can administrate groups.
          schema:
            $ref: '#/definitions/API_Entities_Group'
      tags:
        - groups
      operationId: putApiV4GroupsId
    get:
      description: Get a single group, with containing projects.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of a group
          type: string
          required: true
        - in: query
          name: with_custom_attributes
          description: Include custom attributes in the response
          type: boolean
          default: false
          required: false
        - in: query
          name: with_projects
          description: Omit project details
          type: boolean
          default: true
          required: false
      responses:
        '200':
          description: Get a single group, with containing projects.
          schema:
            $ref: '#/definitions/API_Entities_GroupDetail'
      tags:
        - groups
      operationId: getApiV4GroupsId
    delete:
      description: Remove a group.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of a group
          type: string
          required: true
      responses:
        '204':
          description: Remove a group.
      tags:
        - groups
      operationId: deleteApiV4GroupsId
  /api/v4/groups/{id}/archive:
    post:
      description: Archive a group
