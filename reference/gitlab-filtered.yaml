    delete:
      summary: Delete multiple stopped review apps
      description: >-
        It schedules for deletion multiple environments that have already been stopped and are in the review app folder.
        The actual deletion is performed after 1 week from the time of execution. By default, it only deletes
        environments 30 days or older. You can change this default using the `before` parameter.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project owned by the authenticated user
          type: string
          required: true
        - in: query
          name: before
          description: >-
            The date before which environments can be deleted. Defaults to 30 days ago. Expected in ISO 8601 format
            (`YYYY-MM-DDTHH:MM:SSZ`)
          type: string
          format: date-time
          default: {}
          required: false
        - in: query
          name: limit
          description: Maximum number of environments to delete. Defaults to 100
          type: integer
          format: int32
          default: 100
          minimum: 1
          maximum: 1000
          required: false
        - in: query
          name: dry_run
          description: >-
            Defaults to true for safety reasons. It performs a dry run where no actual deletion will be performed. Set
            to false to actually delete the environment
          type: boolean
          default: true
          required: false
      responses:
        '204':
          description: Delete multiple stopped review apps
          schema:
