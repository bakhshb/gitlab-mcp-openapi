  /api/v4/projects/{id}/repository/commits:
    get:
      description: Get a project repository commits
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: query
          name: ref_name
          description: The name of a repository branch or tag, if not given the default branch is used
          type: string
          required: false
          example: v1.1.0
        - in: query
          name: since
          description: Only commits after or on this date will be returned
          type: string
          format: date-time
          required: false
          example: '2021-09-20T11:50:22.001'
        - in: query
          name: until
          description: Only commits before or on this date will be returned
          type: string
          format: date-time
          required: false
          example: '2021-09-20T11:50:22.001'
        - in: query
          name: path
          description: The file path
          type: string
          required: false
          example: README.md
        - in: query
          name: follow
          description: Follow file renames when filtering by path
          type: boolean
          required: false
        - in: query
          name: author
          description: Search commits by commit author
          type: string
          required: false
          example: John Smith
        - in: query
          name: all
          description: Every commit will be returned
          type: boolean
          required: false
        - in: query
          name: with_stats
          description: Stats about each commit will be added to the response
          type: boolean
          required: false
        - in: query
          name: first_parent
          description: Only include the first parent of merges
          type: boolean
          required: false
        - in: query
          name: order
          description: List commits in order
          type: string
          default: default
          enum:
            - default
            - topo
          required: false
        - in: query
          name: trailers
          description: Parse and include Git trailers for every commit
          type: boolean
          default: false
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Get a project repository commits
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Commit'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
