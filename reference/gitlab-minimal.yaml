  /api/v4/projects/import-relation:
    post:
      summary: Re-import a relation into a project
      description: This feature was introduced in GitLab 16.11.
      produces:
        - application/json
      consumes:
        - multipart/form-data
      parameters:
        - in: formData
          name: path
          description: The project path and name
          type: string
          required: true
