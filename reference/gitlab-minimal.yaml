  /api/v4/issues:
    get:
      description: Get currently authenticated user's issues
      produces:
        - application/json
      parameters:
        - in: query
          name: with_labels_details
          description: Return titles of labels and other details
          type: boolean
          default: false
          required: false
        - in: query
          name: state
          description: Return opened, closed, or all issues
          type: string
          default: all
          enum:
            - opened
            - closed
            - all
          required: false
        - in: query
          name: closed_by_id
          description: Return issues which were closed by the user with the given ID.
          type: integer
          format: int32
          required: false
        - in: query
          name: order_by
          description: >-
            Return issues ordered by `created_at`, `due_date`, `label_priority`, `milestone_due`, `popularity`,
            `priority`, `relative_position`, `title`, or `updated_at` fields.
          type: string
          default: created_at
          enum:
            - created_at
            - due_date
            - label_priority
            - milestone_due
            - popularity
            - priority
            - relative_position
            - title
            - updated_at
            - weight
          required: false
        - in: query
          name: sort
          description: Return issues sorted in `asc` or `desc` order.
          type: string
          default: desc
          enum:
            - asc
            - desc
          required: false
        - in: query
          name: due_date
          description: >-
            Return issues that have no due date (`0`), or whose due date is this week, this month, between two weeks ago
            and next month, or which are overdue. Accepts: `overdue`, `week`, `month`,
            `next_month_and_previous_two_weeks`, `0`
          type: string
          enum:
            - '0'
            - any
            - today
            - tomorrow
            - overdue
            - week
            - month
            - next_month_and_previous_two_weeks
            - ''
          required: false
        - in: query
          name: issue_type
          description: 'The type of the issue. Accepts: issue, incident, test_case, requirement, task, ticket'
          type: string
          enum:
            - issue
            - incident
            - test_case
            - requirement
            - task
            - ticket
          required: false
        - in: query
          name: labels
          description: Comma-separated list of label names
          type: array
          items:
            type: string
          required: false
        - in: query
          name: milestone
          description: Milestone title
          type: string
          required: false
        - in: query
          name: milestone_id
          description: >-
            Return issues assigned to milestones with the specified timebox value ("Any", "None", "Upcoming" or
            "Started")
          type: string
          enum:
            - Any
            - None
            - Upcoming
            - Started
          required: false
        - in: query
          name: iids
          description: The IID array of issues
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: search
          description: Search issues for text present in the title, description, or any combination of these
          type: string
          required: false
        - in: query
          name: in
          description: '`title`, `description`, or a string joining them with comma'
          type: string
          required: false
        - in: query
          name: author_id
          description: Return issues which are authored by the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: author_username
          description: Return issues which are authored by the user with the given username
          type: string
          required: false
        - in: query
          name: assignee_id
          description: Return issues which are assigned to the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: assignee_username
          description: Return issues which are assigned to the user with the given username
          type: array
          items:
            type: string
          required: false
        - in: query
          name: created_after
          description: Return issues created after the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: created_before
          description: Return issues created before the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: updated_after
          description: Return issues updated after the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: updated_before
          description: Return issues updated before the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: not[labels]
          description: Comma-separated list of label names
          type: array
          items:
            type: string
          required: false
        - in: query
          name: not[milestone]
          description: Milestone title
          type: string
          required: false
        - in: query
          name: not[milestone_id]
          description: >-
            Return issues assigned to milestones without the specified timebox value ("Any", "None", "Upcoming" or
            "Started")
          type: string
          enum:
            - Any
            - None
            - Upcoming
            - Started
          required: false
        - in: query
          name: not[iids]
          description: The IID array of issues
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: not[author_id]
          description: Return issues which are not authored by the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: not[author_username]
          description: Return issues which are not authored by the user with the given username
          type: string
          required: false
        - in: query
          name: not[assignee_id]
          description: Return issues which are not assigned to the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: not[assignee_username]
          description: Return issues which are not assigned to the user with the given username
          type: array
          items:
            type: string
          required: false
        - in: query
          name: not[weight]
          description: Return issues without the specified weight
          type: integer
          format: int32
          required: false
        - in: query
          name: not[iteration_id]
          description: Return issues which are not assigned to the iteration with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: not[iteration_title]
          description: Return issues which are not assigned to the iteration with the given title
          type: string
          required: false
        - in: query
          name: scope
          description: 'Return issues for the given scope: `created_by_me`, `assigned_to_me` or `all`'
          type: string
          default: created_by_me
          enum:
            - created-by-me
            - assigned-to-me
            - created_by_me
            - assigned_to_me
            - all
          required: false
        - in: query
          name: my_reaction_emoji
          description: Return issues reacted by the authenticated user by the given emoji
          type: string
          required: false
        - in: query
          name: confidential
          description: Filter confidential or public issues
          type: boolean
          required: false
        - in: query
          name: weight
          description: The weight of the issue
          type: integer
          format: int32
          required: false
        - in: query
          name: epic_id
          description: The ID of an epic associated with the issues
          type: integer
          format: int32
          required: false
        - in: query
          name: health_status
          description: 'The health status of the issue. Must be one of: on_track, needs_attention, at_risk, none, any'
          type: string
          enum:
            - on_track
            - needs_attention
            - at_risk
            - none
            - any
          required: false
        - in: query
          name: iteration_id
          description: Return issues which are assigned to the iteration with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: iteration_title
          description: Return issues which are assigned to the iteration with the given title
          type: string
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: non_archived
          description: Return issues from non archived projects
          type: boolean
          default: true
          required: false
      responses:
        '200':
          description: Get currently authenticated user's issues
          schema:
            $ref: '#/definitions/API_Entities_Issue'
      tags:
        - issues
      operationId: getApiV4Issues
  /api/v4/namespaces:
    get:
      summary: List namespaces
      description: >-
        Get a list of the namespaces of the authenticated user. If the user is an administrator, a list of all
        namespaces in the GitLab instance is shown.
      produces:
        - application/json
      parameters:
        - in: query
          name: search
          description: Returns a list of namespaces the user is authorized to view based on the search criteria
          type: string
          required: false
        - in: query
          name: owned_only
          description: In GitLab 14.2 and later, returns a list of owned namespaces only
          type: boolean
          required: false
        - in: query
          name: top_level_only
          description: Only include top level namespaces
          type: boolean
          default: false
          required: false
        - in: query
          name: full_path_search
          description: If `true`, the `search` parameter is matched against the full path of the namespaces
          type: boolean
          default: false
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: requested_hosted_plan
          description: Name of the hosted plan requested by the customer
          type: string
          required: false
      responses:
        '200':
          description: List namespaces
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Namespace'
        '401':
          description: Unauthorized
      tags:
        - namespaces
      operationId: getApiV4Namespaces
  /api/v4/search:
    get:
      summary: Search on GitLab
      description: This feature was introduced in GitLab 10.5.
      produces:
        - application/json
      parameters:
        - in: query
          name: search
          description: The expression it should be searched for
          type: string
          required: true
        - in: query
          name: scope
          description: The scope of the search
          type: string
          enum:
            - wiki_blobs
            - blobs
            - commits
            - notes
            - projects
            - issues
            - work_items
            - merge_requests
            - milestones
            - snippet_titles
            - users
          required: true
        - in: query
          name: state
          description: Filter results by state
          type: string
          enum:
            - all
            - opened
            - closed
            - merged
          required: false
        - in: query
          name: confidential
          description: Filter results by confidentiality
          type: boolean
          required: false
        - in: query
          name: type
          description: >-
            Filter work items by type. Only applies to work_items scope. Available types: issue, task, epic, incident,
            test_case, requirement, objective, key_result, ticket.
          type: array
          items:
            type: string
          required: false
        - in: query
          name: include_archived
          description: Includes archived projects in the search. Introduced in GitLab 18.9.
          type: boolean
          default: false
          required: false
        - in: query
          name: fields
          description: Array of fields you wish to search. Available with advanced search.
          type: array
          items:
            type: string
            enum:
              - title
          required: false
        - in: query
          name: exclude_forks
          description: Excludes forked projects in the search. Available with exact code search. Introduced in GitLab 18.9.
          type: boolean
          required: false
        - in: query
          name: num_context_lines
          description: >-
            Number of context lines around each match. Available with advanced and exact code search. Introduced in
            GitLab 18.11.
          type: integer
          format: int32
          minimum: 0
          maximum: 20
          required: false
        - in: query
          name: regex
          description: Performs a regex code search. Available with exact code search. Introduced in GitLab 18.9
          type: boolean
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Search on GitLab
      tags:
        - search
      operationId: getApiV4Search
