  /api/v4/projects/{id}/repository/tree:
    get:
      description: Get a project repository tree
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
          example: 1
        - in: query
          name: ref
          description: The name of a repository branch or tag, if not given the default branch is used
          type: string
          required: false
          example: main
        - in: query
          name: path
          description: The path of the tree
          type: string
          required: false
          example: files/html
        - in: query
          name: recursive
          description: Used to get a recursive tree
          type: boolean
          default: false
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: pagination
          description: Specify the pagination method ("none" is only valid if "recursive" is true)
          type: string
          default: legacy
          enum:
            - legacy
            - keyset
            - none
          required: false
        - in: query
          name: page_token
          description: Record from which to start the keyset pagination
