swagger: '2.0'
info:
  title: GitLab API
  version: v4
host: gitlab.com
produces:
  - application/json
securityDefinitions:
  access_token_header:
    type: apiKey
    name: PRIVATE-TOKEN
    in: header
  access_token_query:
    type: apiKey
    name: private_token
    in: query
paths:
  /api/v4/projects/{id}/jobs:
    get:
      description: Get a projects jobs
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: query
          name: scope
          description: The scope of builds to show
          type: array
          items:
            type: string
            enum:
              - created
              - waiting_for_resource
              - preparing
              - waiting_for_callback
              - pending
              - running
              - success
              - failed
              - canceling
              - canceled
              - skipped
              - manual
              - scheduled
          required: false
          example:
            - pending
            - running
        - in: query
          name: ref
          description: The branch name (ref) to filter jobs by
          type: string
          required: false
          example: feature-branch
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Get a projects jobs
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Ci_Job'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - ci_jobs
      operationId: getApiV4ProjectsIdJobs
  /api/v4/projects/{id}/jobs/{job_id}:
    get:
      description: Get a specific job of a project
      produces:
        - application/json
      parameters:
        - in: path
          name: job_id
          description: The ID of a job
          type: integer
          format: int32
          required: true
          example: 88
        - in: path
          name: id
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Get a specific job of a project
          schema:
            $ref: '#/definitions/API_Entities_Ci_Job'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - ci_jobs
      operationId: getApiV4ProjectsIdJobsJobId
  /api/v4/projects/{id}/jobs/{job_id}/cancel:
    post:
      description: Cancel a specific job of a project
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: job_id
          description: The ID of a job
          type: integer
          format: int32
          required: true
          example: 88
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - name: postApiV4ProjectsIdJobsJobIdCancel
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4ProjectsIdJobsJobIdCancel'
      responses:
        '201':
          description: Cancel a specific job of a project
          schema:
            $ref: '#/definitions/API_Entities_Ci_Job'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - ci_jobs
      operationId: postApiV4ProjectsIdJobsJobIdCancel
  /api/v4/projects/{id}/jobs/{job_id}/retry:
    post:
      description: Retry a specific job of a project
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: job_id
          description: The ID of a job
          type: integer
          format: int32
          required: true
          example: 88
        - in: path
          name: id
          type: integer
          format: int32
          required: true
        - name: postApiV4ProjectsIdJobsJobIdRetry
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4ProjectsIdJobsJobIdRetry'
      responses:
        '201':
          description: Retry a specific job of a project
          schema:
            $ref: '#/definitions/API_Entities_Ci_Job'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - ci_jobs
      operationId: postApiV4ProjectsIdJobsJobIdRetry
  /api/v4/projects/{id}/pipelines:
    get:
      summary: Get all Pipelines of the project
      description: This feature was introduced in GitLab 8.11.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID or URL-encoded path
          type: string
          required: true
          example: 11
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: scope
          description: The scope of pipelines
          type: string
          enum:
            - running
            - pending
            - finished
            - branches
            - tags
          required: false
          example: pending
        - in: query
          name: status
          description: The status of pipelines
          type: string
          enum:
            - created
            - waiting_for_resource
            - preparing
            - waiting_for_callback
            - pending
            - running
            - success
            - failed
            - canceling
            - canceled
            - skipped
            - manual
            - scheduled
          required: false
          example: pending
        - in: query
          name: ref
          description: The ref of pipelines
          type: string
          required: false
          example: develop
        - in: query
          name: sha
          description: The sha of pipelines
          type: string
          required: false
          example: a91957a858320c0e17f3a0eca7cfacbff50ea29a
        - in: query
          name: yaml_errors
          description: Returns pipelines with invalid configurations
          type: boolean
          required: false
        - in: query
          name: username
          description: The username of the user who triggered pipelines
          type: string
          required: false
          example: root
        - in: query
          name: updated_before
          description: 'Return pipelines updated before the specified datetime. Format: ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
          type: string
          format: date-time
          required: false
          example: '2015-12-24T15:51:21.880Z'
        - in: query
          name: updated_after
          description: 'Return pipelines updated after the specified datetime. Format: ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
          type: string
          format: date-time
          required: false
          example: '2015-12-24T15:51:21.880Z'
        - in: query
          name: created_before
          description: 'Return pipelines created before the specified datetime. Format: ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
          type: string
          format: date-time
          required: false
          example: '2015-12-24T15:51:21.880Z'
        - in: query
          name: created_after
          description: 'Return pipelines created after the specified datetime. Format: ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
          type: string
          format: date-time
          required: false
          example: '2015-12-24T15:51:21.880Z'
        - in: query
          name: order_by
          description: Order pipelines
          type: string
          default: id
          enum:
            - id
            - status
            - ref
            - updated_at
            - user_id
          required: false
          example: status
        - in: query
          name: sort
          description: Sort pipelines
          type: string
          default: desc
          enum:
            - asc
            - desc
          required: false
          example: asc
        - in: query
          name: source
          description: The source of pipelines
          type: string
          enum:
            - unknown
            - push
            - web
            - trigger
            - schedule
            - api
            - external
            - pipeline
            - chat
            - webide
            - merge_request_event
            - external_pull_request_event
            - parent_pipeline
            - ondemand_dast_scan
            - ondemand_dast_validation
            - security_orchestration_policy
            - container_registry_push
            - duo_workflow
            - pipeline_execution_policy_schedule
            - dependency_management_security_update
          required: false
          example: push
        - in: query
          name: name
          description: Filter pipelines by name
          type: string
          required: false
          example: Build pipeline
      responses:
        '200':
          description: Get all Pipelines of the project
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Ci_PipelineBasic'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      tags:
        - pipelines
      operationId: getApiV4ProjectsIdPipelines
  /api/v4/projects/{id}/pipeline:
    post:
      summary: Create a new pipeline
      description: This feature was introduced in GitLab 8.14
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID or URL-encoded path
          type: string
          required: true
          example: 11
        - name: postApiV4ProjectsIdPipeline
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4ProjectsIdPipeline'
      responses:
        '201':
          description: Create a new pipeline
          schema:
            $ref: '#/definitions/API_Entities_Ci_Pipeline'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - pipelines
      operationId: postApiV4ProjectsIdPipeline
  /api/v4/projects/{id}/pipelines/latest:
    get:
      summary: Gets the latest pipeline for the project branch
      description: This feature was introduced in GitLab 12.3
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID or URL-encoded path
          type: string
          required: true
          example: 11
        - in: query
          name: ref
          description: Branch ref of pipeline. Uses project default branch if not specified.
          type: string
          required: false
          example: develop
      responses:
        '200':
          description: Gets the latest pipeline for the project branch
          schema:
            $ref: '#/definitions/API_Entities_Ci_PipelineWithMetadata'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - pipelines
      operationId: getApiV4ProjectsIdPipelinesLatest
  /api/v4/projects/{id}/pipelines/{pipeline_id}:
    get:
      summary: Gets a specific pipeline for the project
      description: This feature was introduced in GitLab 8.11
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID or URL-encoded path
          type: string
          required: true
          example: 11
        - in: path
          name: pipeline_id
          description: The pipeline ID
          type: integer
          format: int32
          required: true
          example: 18
      responses:
        '200':
          description: Gets a specific pipeline for the project
          schema:
            $ref: '#/definitions/API_Entities_Ci_PipelineWithMetadata'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - pipelines
      operationId: getApiV4ProjectsIdPipelinesPipelineId
    delete:
      summary: Deletes a pipeline
      description: This feature was introduced in GitLab 11.6
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID or URL-encoded path
          type: string
          required: true
          example: 11
        - in: path
          name: pipeline_id
          description: The pipeline ID
          type: integer
          format: int32
          required: true
          example: 18
      responses:
        '204':
          description: Pipeline was deleted
        '403':
          description: Forbidden
      tags:
        - pipelines
      operationId: deleteApiV4ProjectsIdPipelinesPipelineId
  /api/v4/projects/{id}/pipelines/{pipeline_id}/retry:
    post:
      summary: Retry builds in the pipeline
      description: This feature was introduced in GitLab 8.11.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID or URL-encoded path
          type: string
          required: true
          example: 11
        - in: path
          name: pipeline_id
          description: The pipeline ID
          type: integer
          format: int32
          required: true
          example: 18
      responses:
        '201':
          description: Retry builds in the pipeline
          schema:
            $ref: '#/definitions/API_Entities_Ci_Pipeline'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - pipelines
      operationId: postApiV4ProjectsIdPipelinesPipelineIdRetry
  /api/v4/projects/{id}/pipelines/{pipeline_id}/cancel:
    post:
      summary: Cancel all builds in the pipeline
      description: This feature was introduced in GitLab 8.11.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID or URL-encoded path
          type: string
          required: true
          example: 11
        - in: path
          name: pipeline_id
          description: The pipeline ID
          type: integer
          format: int32
          required: true
          example: 18
      responses:
        '201':
          description: Cancel all builds in the pipeline
          schema:
            $ref: '#/definitions/API_Entities_Ci_Pipeline'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - pipelines
      operationId: postApiV4ProjectsIdPipelinesPipelineIdCancel
  /api/v4/projects/{id}/repository/commits:
    get:
      description: Get a project repository commits
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: query
          name: ref_name
          description: The name of a repository branch or tag, if not given the default branch is used
          type: string
          required: false
          example: v1.1.0
        - in: query
          name: since
          description: Only commits after or on this date will be returned
          type: string
          format: date-time
          required: false
          example: '2021-09-20T11:50:22.001'
        - in: query
          name: until
          description: Only commits before or on this date will be returned
          type: string
          format: date-time
          required: false
          example: '2021-09-20T11:50:22.001'
        - in: query
          name: path
          description: The file path
          type: string
          required: false
          example: README.md
        - in: query
          name: follow
          description: Follow file renames when filtering by path
          type: boolean
          required: false
        - in: query
          name: author
          description: Search commits by commit author
          type: string
          required: false
          example: John Smith
        - in: query
          name: all
          description: Every commit will be returned
          type: boolean
          required: false
        - in: query
          name: with_stats
          description: Stats about each commit will be added to the response
          type: boolean
          required: false
        - in: query
          name: first_parent
          description: Only include the first parent of merges
          type: boolean
          required: false
        - in: query
          name: order
          description: List commits in order
          type: string
          default: default
          enum:
            - default
            - topo
          required: false
        - in: query
          name: trailers
          description: Parse and include Git trailers for every commit
          type: boolean
          default: false
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Get a project repository commits
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Commit'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
      tags:
        - commits
      operationId: getApiV4ProjectsIdRepositoryCommits
    post:
      summary: Create a new commit
      description: This feature was introduced in GitLab 8.13
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - name: postApiV4ProjectsIdRepositoryCommits
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4ProjectsIdRepositoryCommits'
      responses:
        '200':
          description: Create a new commit
          schema:
            $ref: '#/definitions/API_Entities_CommitDetail'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - commits
      operationId: postApiV4ProjectsIdRepositoryCommits
  /api/v4/projects/{id}/repository/commits/{sha}:
    get:
      description: Get a specific commit of a project
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: path
          name: sha
          description: A commit sha, or the name of a branch or tag
          type: string
          required: true
        - in: query
          name: stats
          description: Include commit stats
          type: boolean
          default: true
          required: false
      responses:
        '200':
          description: Get a specific commit of a project
          schema:
            $ref: '#/definitions/API_Entities_CommitDetail'
        '404':
          description: Not found
      tags:
        - commits
      operationId: getApiV4ProjectsIdRepositoryCommitsSha
  /api/v4/projects/{id}/repository/commits/{sha}/diff:
    get:
      description: Get the diff for a specific commit of a project
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: path
          name: sha
          description: A commit sha, or the name of a branch or tag
          type: string
          required: true
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: unidiff
          description: A diff in a Unified diff format
          type: boolean
          default: false
          required: false
      responses:
        '200':
          description: Get the diff for a specific commit of a project
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Diff'
        '404':
          description: Not found
      tags:
        - commits
      operationId: getApiV4ProjectsIdRepositoryCommitsShaDiff
  /api/v4/projects/{id}/repository/files/{file_path}/raw:
    get:
      description: Get raw file contents from the repository
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The project ID
          type: string
          required: true
          example: gitlab-org/gitlab
        - in: path
          name: file_path
          description: The URL-encoded path to the file.
          type: string
          required: true
          example: lib%2Fclass%2Erb
        - in: query
          name: ref
          description: The name of branch, tag or commit
          type: string
          required: false
          example: main
        - in: query
          name: lfs
          description: Retrieve binary data for a file that is an lfs pointer
          type: boolean
          default: false
          required: false
      responses:
        '200':
          description: Get raw file contents from the repository
          schema:
            type: file
      tags:
        - files
      operationId: getApiV4ProjectsIdRepositoryFilesFilePathRaw
  /api/v4/projects/{id}/issues:
    get:
      description: Get a list of project issues
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: query
          name: with_labels_details
          description: Return titles of labels and other details
          type: boolean
          default: false
          required: false
        - in: query
          name: state
          description: Return opened, closed, or all issues
          type: string
          default: all
          enum:
            - opened
            - closed
            - all
          required: false
        - in: query
          name: closed_by_id
          description: Return issues which were closed by the user with the given ID.
          type: integer
          format: int32
          required: false
        - in: query
          name: order_by
          description: >-
            Return issues ordered by `created_at`, `due_date`, `label_priority`, `milestone_due`, `popularity`,
            `priority`, `relative_position`, `title`, or `updated_at` fields.
          type: string
          default: created_at
          enum:
            - created_at
            - due_date
            - label_priority
            - milestone_due
            - popularity
            - priority
            - relative_position
            - title
            - updated_at
            - weight
          required: false
        - in: query
          name: sort
          description: Return issues sorted in `asc` or `desc` order.
          type: string
          default: desc
          enum:
            - asc
            - desc
          required: false
        - in: query
          name: due_date
          description: >-
            Return issues that have no due date (`0`), or whose due date is this week, this month, between two weeks ago
            and next month, or which are overdue. Accepts: `overdue`, `week`, `month`,
            `next_month_and_previous_two_weeks`, `0`
          type: string
          enum:
            - '0'
            - any
            - today
            - tomorrow
            - overdue
            - week
            - month
            - next_month_and_previous_two_weeks
            - ''
          required: false
        - in: query
          name: issue_type
          description: 'The type of the issue. Accepts: issue, incident, test_case, requirement, task, ticket'
          type: string
          enum:
            - issue
            - incident
            - test_case
            - requirement
            - task
            - ticket
          required: false
        - in: query
          name: labels
          description: Comma-separated list of label names
          type: array
          items:
            type: string
          required: false
        - in: query
          name: milestone
          description: Milestone title
          type: string
          required: false
        - in: query
          name: milestone_id
          description: >-
            Return issues assigned to milestones with the specified timebox value ("Any", "None", "Upcoming" or
            "Started")
          type: string
          enum:
            - Any
            - None
            - Upcoming
            - Started
          required: false
        - in: query
          name: iids
          description: The IID array of issues
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: search
          description: Search issues for text present in the title, description, or any combination of these
          type: string
          required: false
        - in: query
          name: in
          description: '`title`, `description`, or a string joining them with comma'
          type: string
          required: false
        - in: query
          name: author_id
          description: Return issues which are authored by the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: author_username
          description: Return issues which are authored by the user with the given username
          type: string
          required: false
        - in: query
          name: assignee_id
          description: Return issues which are assigned to the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: assignee_username
          description: Return issues which are assigned to the user with the given username
          type: array
          items:
            type: string
          required: false
        - in: query
          name: created_after
          description: Return issues created after the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: created_before
          description: Return issues created before the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: updated_after
          description: Return issues updated after the specified time
          type: string
          format: date-time
          required: false
        - in: query
