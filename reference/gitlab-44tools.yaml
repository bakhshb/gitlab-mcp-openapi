    delete:
      summary: Delete a merge request
      description: 'Only for administrators and project owners. Deletes the merge request in question. '
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project.
          type: string
          required: true
        - in: path
          name: merge_request_iid
          description: The internal ID of the merge request.
          type: integer
          format: int32
          required: true
      responses:
        '204':
          description: Delete a merge request
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '412':
          description: Precondition failed
      tags:
        - merge_requests
      operationId: deleteApiV4ProjectsIdMergeRequestsMergeRequestIid
    get:
      summary: Get single merge request
      description: >-
        Shows information about a single merge request. Note: the `changes_count` value in the response is a string, not
        an integer. This is because when an merge request has too many changes to display and store, it is capped at
        1,000. In that case, the API returns the string `"1000+"` for the changes count.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project.
          type: string
          required: true
        - in: path
          name: merge_request_iid
          description: The internal ID of the merge request.
          type: integer
          format: int32
          required: true
        - in: query
          name: render_html
          description: If `true`, response includes rendered HTML for title and description.
          type: boolean
          required: false
        - in: query
          name: include_diverged_commits_count
          description: If `true`, response includes the commits behind the target branch.
          type: boolean
          required: false
        - in: query
          name: include_rebase_in_progress
          description: If `true`, response includes whether a rebase operation is in progress.
          type: boolean
          required: false
      responses:
        '200':
          description: Get single merge request
          schema:
            $ref: '#/definitions/API_Entities_MergeRequest'
        '404':
          description: Not found
      tags:
        - merge_requests
      operationId: getApiV4ProjectsIdMergeRequestsMergeRequestIid
    put:
      summary: Update merge request
      description: Updates an existing merge request. You can change the target branch, title, or even close the merge request.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project.
          type: string
          required: true
        - in: path
