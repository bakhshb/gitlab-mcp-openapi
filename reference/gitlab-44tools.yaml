  /api/v4/projects/{id}/merge_requests:
    get:
      summary: List project merge requests
      description: Get all merge requests for this project.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project.
          type: string
          required: true
        - in: query
          name: author_id
          description: >-
            Returns merge requests created by the given user `id`. Mutually exclusive with `author_username`. Combine
            with `scope=all` or `scope=assigned_to_me`.
          type: integer
          format: int32
          required: false
        - in: query
          name: author_username
          description: Returns merge requests created by the given `username`. Mutually exclusive with `author_id`.
          type: string
          required: false
        - in: query
          name: assignee_id
          description: >-
            Returns merge requests assigned to the given user `id`. `None` returns unassigned merge requests. `Any`
            returns merge requests with an assignee.
          type: integer
          format: int32
          required: false
        - in: query
          name: assignee_username
          description: Returns merge requests created by the given `username`. Mutually exclusive with `author_id`.
          type: array
          items:
            type: string
          required: false
        - in: query
          name: reviewer_username
          description: >-
            Returns merge requests which have the user as a reviewer with the given `username`. `None` returns merge
            requests with no reviewers. `Any` returns merge requests with any reviewer. Mutually exclusive with
            `reviewer_id`. Introduced in GitLab 13.8.
          type: string
          required: false
        - in: query
          name: labels
          description: >-
            Returns merge requests matching a comma-separated list of labels. `None` lists all merge requests with no
            labels. `Any` lists all merge requests with at least one label. Predefined names are case-insensitive.
          type: array
          items:
            type: string
          required: false
        - in: query
          name: milestone
          description: >-
            Returns merge requests for a specific milestone. `None` returns merge requests with no milestone. `Any`
            returns merge requests that have an assigned milestone.
          type: string
          required: false
        - in: query
          name: my_reaction_emoji
          description: >-
            Returns merge requests reacted by the authenticated user by the given `emoji`. `None` returns issues not
            given a reaction. `Any` returns issues given at least one reaction.
          type: string
          required: false
        - in: query
          name: reviewer_id
          description: >-
            Returns merge requests which have the user as a reviewer with the given user `id`. `None` returns merge
            requests with no reviewers. `Any` returns merge requests with any reviewer. Mutually exclusive with
            `reviewer_username`.
          type: integer
          format: int32
          required: false
        - in: query
          name: state
          description: Returns `all` merge requests or just those that are `opened`, `closed`, `locked`, or `merged`.
          type: string
          default: all
          enum:
            - opened
            - closed
            - locked
            - merged
            - all
          required: false
        - in: query
          name: order_by
          description: >-
            Returns merge requests ordered by `created_at`, `label_priority`, `milestone_due`, `popularity`, `priority`,
            `title`, `updated_at` or `merged_at` fields. Introduced in GitLab 14.8.
          type: string
          default: created_at
          enum:
            - created_at
            - label_priority
            - milestone_due
            - popularity
            - priority
            - title
            - updated_at
            - merged_at
          required: false
        - in: query
          name: sort
          description: Returns merge requests sorted in `asc` or `desc` order.
          type: string
          default: desc
          enum:
            - asc
            - desc
          required: false
        - in: query
          name: with_labels_details
          description: >-
            If `true`, response returns more details for each label in labels field: `:name`,`:color`, `:description`,
            `:description_html`, `:text_color`
          type: boolean
          default: false
          required: false
        - in: query
          name: with_merge_status_recheck
          description: >-
            If `true`, this projection requests (but does not guarantee) that the `merge_status` field be recalculated
            asynchronously. Introduced in GitLab 13.0.
          type: boolean
          default: false
          required: false
        - in: query
          name: created_after
          description: Returns merge requests created on or after the given time. Expected in ISO 8601 format.
          type: string
          format: date-time
          required: false
          example: '2019-03-15T08:00:00Z'
        - in: query
          name: created_before
          description: Returns merge requests created on or before the given time. Expected in ISO 8601 format.
          type: string
          format: date-time
          required: false
          example: '2019-03-15T08:00:00Z'
        - in: query
          name: updated_after
          description: Returns merge requests updated on or after the given time. Expected in ISO 8601 format.
          type: string
          format: date-time
          required: false
          example: '2019-03-15T08:00:00Z'
        - in: query
          name: updated_before
          description: Returns merge requests updated on or before the given time. Expected in ISO 8601 format.
          type: string
          format: date-time
          required: false
          example: '2019-03-15T08:00:00Z'
        - in: query
          name: view
          description: If simple, returns the `iid`, URL, title, description, and basic state of merge request
          type: string
          enum:
            - simple
          required: false
        - in: query
          name: scope
          description: 'Returns merge requests for the given scope: `created_by_me`, `assigned_to_me`, `reviews_for_me` or `all`'
          type: string
          enum:
            - created-by-me
            - assigned-to-me
            - created_by_me
            - assigned_to_me
            - reviews_for_me
            - all
          required: false
        - in: query
          name: source_branch
          description: Returns merge requests with the given source branch
          type: string
          required: false
        - in: query
          name: source_project_id
          description: Returns merge requests with the given source project id
          type: integer
          format: int32
          required: false
        - in: query
          name: target_branch
          description: Returns merge requests with the given target branch
          type: string
          required: false
        - in: query
          name: search
          description: Search merge requests against their `title` and `description`.
          type: string
          required: false
        - in: query
          name: in
          description: Modify the scope of the search attribute. `title`, `description`, or a string joining them with comma.
          type: string
          required: false
          example: title,description
        - in: query
          name: wip
          description: >-
            Filter merge requests against their `wip` status. `yes` to return only draft merge requests, `no` to return
            non-draft merge requests.
          type: string
          enum:
            - 'yes'
            - 'no'
          required: false
        - in: query
          name: not[author_id]
          description: >-
            `<Negated>` Returns merge requests created by the given user `id`. Mutually exclusive with
            `author_username`. Combine with `scope=all` or `scope=assigned_to_me`.
          type: integer
          format: int32
          required: false
        - in: query
          name: not[author_username]
          description: '`<Negated>` Returns merge requests created by the given `username`. Mutually exclusive with `author_id`.'
          type: string
          required: false
        - in: query
          name: not[assignee_id]
          description: >-
            `<Negated>` Returns merge requests assigned to the given user `id`. `None` returns unassigned merge
            requests. `Any` returns merge requests with an assignee.
          type: integer
          format: int32
          required: false
        - in: query
          name: not[assignee_username]
          description: '`<Negated>` Returns merge requests created by the given `username`. Mutually exclusive with `author_id`.'
          type: array
          items:
            type: string
          required: false
        - in: query
          name: not[reviewer_username]
          description: >-
            `<Negated>` Returns merge requests which have the user as a reviewer with the given `username`. `None`
            returns merge requests with no reviewers. `Any` returns merge requests with any reviewer. Mutually exclusive
            with `reviewer_id`. Introduced in GitLab 13.8.
          type: string
          required: false
        - in: query
          name: not[labels]
          description: >-
            `<Negated>` Returns merge requests matching a comma-separated list of labels. `None` lists all merge
            requests with no labels. `Any` lists all merge requests with at least one label. Predefined names are
            case-insensitive.
          type: array
          items:
            type: string
          required: false
        - in: query
          name: not[milestone]
          description: >-
            `<Negated>` Returns merge requests for a specific milestone. `None` returns merge requests with no
            milestone. `Any` returns merge requests that have an assigned milestone.
          type: string
          required: false
        - in: query
          name: not[my_reaction_emoji]
          description: >-
            `<Negated>` Returns merge requests reacted by the authenticated user by the given `emoji`. `None` returns
            issues not given a reaction. `Any` returns issues given at least one reaction.
          type: string
          required: false
        - in: query
          name: not[reviewer_id]
          description: >-
            `<Negated>` Returns merge requests which have the user as a reviewer with the given user `id`. `None`
            returns merge requests with no reviewers. `Any` returns merge requests with any reviewer. Mutually exclusive
            with `reviewer_username`.
          type: integer
          format: int32
          required: false
        - in: query
          name: deployed_before
          description: Returns merge requests deployed before the given date/time. Expected in ISO 8601 format.
          type: string
          required: false
          example: '2019-03-15T08:00:00Z'
        - in: query
          name: deployed_after
          description: Returns merge requests deployed after the given date/time. Expected in ISO 8601 format
          type: string
          required: false
          example: '2019-03-15T08:00:00Z'
        - in: query
          name: environment
          description: Returns merge requests deployed to the given environment
          type: string
          required: false
          example: '2019-03-15T08:00:00Z'
        - in: query
          name: approved
          description: >-
            Filters merge requests by their `approved` status. `yes` returns only approved merge requests. `no` returns
            only non-approved merge requests.
          type: string
          enum:
            - 'yes'
            - 'no'
          required: false
        - in: query
          name: merge_user_id
          description: >-
            Returns merge requests which have been merged by the user with the given user `id`. Mutually exclusive with
            `merge_user_username`.
          type: integer
          format: int32
          required: false
        - in: query
          name: merge_user_username
          description: >-
            Returns merge requests which have been merged by the user with the given `username`. Mutually exclusive with
            `merge_user_id`.
          type: string
          required: false
        - in: query
          name: approver_ids
          description: Return merge requests which have specified the users with the given IDs as an individual approver
