swagger: '2.0'
info:
  title: GitLab API
  version: v4
host: gitlab.com
produces:
  - application/json
securityDefinitions:
  access_token_header:
    type: apiKey
    name: PRIVATE-TOKEN
    in: header
  access_token_query:
    type: apiKey
    name: private_token
    in: query
paths:
  /api/v4/groups:
    get:
      description: Get a groups list
      produces:
        - application/json
      parameters:
        - in: query
          name: statistics
          description: Include project statistics
          type: boolean
          default: false
          required: false
        - in: query
          name: archived
          description: Limit by archived status
          type: boolean
          required: false
        - in: query
          name: skip_groups
          description: Array of group ids to exclude from list
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: all_available
          description: When `true`, returns all accessible groups. When `false`, returns only groups where the user is a member.
          type: boolean
          required: false
        - in: query
          name: visibility
          description: Limit by visibility
          type: string
          enum:
            - private
            - internal
            - public
          required: false
        - in: query
          name: search
          description: Search for a specific group
          type: string
          required: false
        - in: query
          name: owned
          description: Limit by owned by authenticated user
          type: boolean
          default: false
          required: false
        - in: query
          name: order_by
          description: Order by name, path, id or similarity if searching
          type: string
          default: name
          enum:
            - name
            - path
            - id
            - similarity
          required: false
        - in: query
          name: sort
          description: Sort by asc (ascending) or desc (descending)
          type: string
          default: asc
          enum:
            - asc
            - desc
          required: false
        - in: query
          name: min_access_level
          description: Minimum access level of authenticated user
          type: integer
          format: int32
          enum:
            - 10
            - 15
            - 20
            - 30
            - 40
            - 50
          required: false
        - in: query
          name: top_level_only
          description: Only include top-level groups
          type: boolean
          required: false
        - in: query
          name: marked_for_deletion_on
          description: Return groups that are marked for deletion on this date
          type: string
          format: date
          required: false
        - in: query
          name: active
          description: Limit by groups that are not archived and not marked for deletion
          type: boolean
          required: false
        - in: query
          name: repository_storage
          description: Filter by repository storage used by the group
          type: string
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: with_custom_attributes
          description: Include custom attributes in the response
          type: boolean
          default: false
          required: false
      responses:
        '200':
          description: Get a groups list
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Group'
      tags:
        - groups
      operationId: getApiV4Groups
    post:
      description: Create a group. Available only for users who can create groups.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - name: postApiV4Groups
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4Groups'
      responses:
        '201':
          description: Create a group. Available only for users who can create groups.
          schema:
            $ref: '#/definitions/API_Entities_Group'
      tags:
        - groups
      operationId: postApiV4Groups
  /api/v4/groups/{id}:
    put:
      description: Update a group. Available only for users who can administrate groups.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of a group
          type: string
          required: true
        - name: putApiV4GroupsId
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4GroupsId'
      responses:
        '200':
          description: Update a group. Available only for users who can administrate groups.
          schema:
            $ref: '#/definitions/API_Entities_Group'
      tags:
        - groups
      operationId: putApiV4GroupsId
    get:
      description: Get a single group, with containing projects.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of a group
          type: string
          required: true
        - in: query
          name: with_custom_attributes
          description: Include custom attributes in the response
          type: boolean
          default: false
          required: false
        - in: query
          name: with_projects
          description: Omit project details
          type: boolean
          default: true
          required: false
      responses:
        '200':
          description: Get a single group, with containing projects.
          schema:
            $ref: '#/definitions/API_Entities_GroupDetail'
      tags:
        - groups
      operationId: getApiV4GroupsId
    delete:
      description: Remove a group.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of a group
          type: string
          required: true
      responses:
        '204':
          description: Remove a group.
      tags:
        - groups
      operationId: deleteApiV4GroupsId
  /api/v4/groups/import:
    post:
      summary: Create a new group import
      description: This feature was introduced in GitLab 12.8
      produces:
        - application/json
      consumes:
        - multipart/form-data
      parameters:
        - in: formData
          name: path
          description: Group path
          type: string
          required: true
        - in: formData
          name: name
          description: Group name
          type: string
          required: true
        - in: formData
          name: file
          description: The group export file to be imported
          type: file
          required: true
        - in: formData
          name: parent_id
          description: The ID of the parent group that the group will be imported into. Defaults to the current user's namespace.
          type: integer
          format: int32
          required: false
        - in: formData
          name: organization_id
          description: 'The ID of the organization that the group will be part of. '
          type: integer
          format: int32
          default: {}
          required: false
      responses:
        '202':
          description: Create a new group import
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '503':
          description: Service unavailable
      tags:
        - group_import_and_export
      operationId: postApiV4GroupsImport
  /api/v4/groups/{id}/variables:
    get:
      description: Get a list of group-level variables
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: |-
            The ID of a group or URL-encoded path of the group owned by the authenticated
                  user
          type: string
          required: true
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Get a list of group-level variables
          schema:
            $ref: '#/definitions/API_Entities_Ci_Variable'
      tags:
        - ci_variables
      operationId: getApiV4GroupsIdVariables
    post:
      description: Create a new variable in a group
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: |-
            The ID of a group or URL-encoded path of the group owned by the authenticated
                  user
          type: string
          required: true
        - name: postApiV4GroupsIdVariables
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4GroupsIdVariables'
      responses:
        '201':
          description: Create a new variable in a group
          schema:
            $ref: '#/definitions/API_Entities_Ci_Variable'
        '400':
          description: 400 Bad Request
      tags:
        - ci_variables
      operationId: postApiV4GroupsIdVariables
  /api/v4/groups/{id}/variables/{key}:
    get:
      description: Get the details of a group’s specific variable
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: |-
            The ID of a group or URL-encoded path of the group owned by the authenticated
                  user
          type: string
          required: true
        - in: path
          name: key
          description: The key of the variable
          type: string
          required: true
      responses:
        '200':
          description: Get the details of a group’s specific variable
          schema:
            $ref: '#/definitions/API_Entities_Ci_Variable'
        '404':
          description: Group Variable Not Found
      tags:
        - ci_variables
      operationId: getApiV4GroupsIdVariablesKey
    put:
      description: Update an existing variable from a group
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: |-
            The ID of a group or URL-encoded path of the group owned by the authenticated
                  user
          type: string
          required: true
        - in: path
          name: key
          description: The key of a variable
          type: string
          required: true
        - name: putApiV4GroupsIdVariablesKey
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4GroupsIdVariablesKey'
      responses:
        '200':
          description: Update an existing variable from a group
          schema:
            $ref: '#/definitions/API_Entities_Ci_Variable'
        '400':
          description: 400 Bad Request
        '404':
          description: Group Variable Not Found
      tags:
        - ci_variables
      operationId: putApiV4GroupsIdVariablesKey
    delete:
      description: Delete an existing variable from a group
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: |-
            The ID of a group or URL-encoded path of the group owned by the authenticated
                  user
          type: string
          required: true
        - in: path
          name: key
          description: The key of a variable
          type: string
          required: true
      responses:
        '204':
          description: Delete an existing variable from a group
          schema:
            $ref: '#/definitions/API_Entities_Ci_Variable'
        '404':
          description: Group Variable Not Found
      tags:
        - ci_variables
      operationId: deleteApiV4GroupsIdVariablesKey
  /api/v4/groups/{id}/members:
    get:
      description: Gets a list of group or project members viewable by the authenticated user.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The group ID
          type: string
          required: true
        - in: query
          name: query
          description: A query string to search for members
          type: string
          required: false
        - in: query
          name: user_ids
          description: Array of user ids to look up for membership
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: skip_users
          description: Array of user ids to be skipped for membership
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: show_seat_info
          description: Show seat information for members
          type: boolean
          required: false
        - in: query
          name: with_saml_identity
          description: List only members with linked SAML identity
          type: boolean
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Gets a list of group or project members viewable by the authenticated user.
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Member'
      tags:
        - members
      operationId: getApiV4GroupsIdMembers
    post:
      description: Adds a member to a group or project.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The group ID
          type: string
          required: true
        - name: postApiV4GroupsIdMembers
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4GroupsIdMembers'
      responses:
        '201':
          description: Adds a member to a group or project.
          schema:
            $ref: '#/definitions/API_Entities_Member'
      tags:
        - members
      operationId: postApiV4GroupsIdMembers
  /api/v4/groups/{id}/members/all:
    get:
      description: >-
        Gets a list of group or project members viewable by the authenticated user, including those who gained
        membership through ancestor group.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The group ID
          type: string
          required: true
        - in: query
          name: query
          description: A query string to search for members
          type: string
          required: false
        - in: query
          name: user_ids
          description: Array of user ids to look up for membership
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: show_seat_info
          description: Show seat information for members
          type: boolean
          required: false
        - in: query
          name: state
          description: Filter results by member state
          type: string
          enum:
            - awaiting
            - active
          required: false
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: >-
            Gets a list of group or project members viewable by the authenticated user, including those who gained
            membership through ancestor group.
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Member'
      tags:
        - members
      operationId: getApiV4GroupsIdMembersAll
  /api/v4/groups/{id}/members/{user_id}:
    get:
      description: Gets a member of a group or project.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The group ID
          type: string
          required: true
        - in: path
          name: user_id
          description: The user ID of the member
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Gets a member of a group or project.
          schema:
            $ref: '#/definitions/API_Entities_Member'
      tags:
        - members
      operationId: getApiV4GroupsIdMembersUserId
    put:
      description: Updates a member of a group or project.
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The group ID
          type: string
          required: true
        - in: path
          name: user_id
          description: The user ID of the new member
          type: integer
          format: int32
          required: true
        - name: putApiV4GroupsIdMembersUserId
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4GroupsIdMembersUserId'
      responses:
        '200':
          description: Updates a member of a group or project.
          schema:
            $ref: '#/definitions/API_Entities_Member'
      tags:
        - members
      operationId: putApiV4GroupsIdMembersUserId
    delete:
      description: Removes a user from a group or project.
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The group ID
          type: string
          required: true
        - in: path
          name: user_id
          description: The user ID of the member
          type: integer
          format: int32
          required: true
        - in: query
          name: skip_subresources
          description: >-
            Flag indicating if the deletion of direct memberships of the removed member in subgroups and projects should
            be skipped
          type: boolean
          default: false
          required: false
        - in: query
          name: unassign_issuables
          description: >-
            Flag indicating if the removed member should be unassigned from any issues or merge requests within given
            group or project
          type: boolean
          default: false
          required: false
      responses:
        '204':
          description: Removes a user from a group or project.
      tags:
        - members
      operationId: deleteApiV4GroupsIdMembersUserId
  /api/v4/groups/{id}/members/approve_all:
    post:
      description: Approves all pending members
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of a group
          type: string
          required: true
      responses:
        '201':
          description: Approves all pending members
      tags:
        - members
      operationId: postApiV4GroupsIdMembersApproveAll
  /api/v4/projects/{id}/repository/branches:
    get:
      description: Get a project repository branches
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
        - in: query
          name: search
          description: Return list of branches matching the search criteria
          type: string
          required: false
        - in: query
          name: regex
          description: Return list of branches matching the regex
          type: string
          required: false
        - in: query
          name: sort
          description: Return list of branches sorted by the given field
          type: string
          enum:
            - name_asc
            - updated_asc
            - updated_desc
          required: false
        - in: query
          name: page_token
          description: Name of branch to start the pagination from
          type: string
          required: false
      responses:
        '200':
          description: Get a project repository branches
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Branch'
        '404':
          description: 404 Project Not Found
      tags:
        - branches
      operationId: getApiV4ProjectsIdRepositoryBranches
    post:
      description: Create branch
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - name: postApiV4ProjectsIdRepositoryBranches
          in: body
          required: true
          schema:
            $ref: '#/definitions/postApiV4ProjectsIdRepositoryBranches'
      responses:
        '201':
          description: Create branch
          schema:
            $ref: '#/definitions/API_Entities_Branch'
        '400':
          description: Failed to create branch
      tags:
        - branches
      operationId: postApiV4ProjectsIdRepositoryBranches
  /api/v4/projects/{id}/repository/branches/{branch}:
    head:
      description: Check if a branch exists
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: path
          name: branch
          description: The name of the branch
          type: string
          required: true
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
      tags:
        - branches
      operationId: headApiV4ProjectsIdRepositoryBranchesBranch
    get:
      description: Get a single repository branch
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: path
          name: branch
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Get a single repository branch
          schema:
            $ref: '#/definitions/API_Entities_Branch'
        '404':
          description: Branch Not Found
      tags:
        - branches
      operationId: getApiV4ProjectsIdRepositoryBranchesBranch
    delete:
      description: Delete a branch
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: path
          name: branch
          description: The name of the branch
          type: string
          required: true
      responses:
        '204':
          description: Delete a branch
        '404':
          description: Branch Not Found
      tags:
        - branches
      operationId: deleteApiV4ProjectsIdRepositoryBranchesBranch
  /api/v4/projects/{id}/repository/branches/{branch}/protect:
    put:
      description: Protect a single branch
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: path
          name: branch
          description: The name of the branch
          type: string
          required: true
        - name: putApiV4ProjectsIdRepositoryBranchesBranchProtect
          in: body
          required: true
          schema:
            $ref: '#/definitions/putApiV4ProjectsIdRepositoryBranchesBranchProtect'
      responses:
        '200':
          description: Protect a single branch
          schema:
            $ref: '#/definitions/API_Entities_Branch'
        '404':
          description: 404 Branch Not Found
      tags:
        - branches
      operationId: putApiV4ProjectsIdRepositoryBranchesBranchProtect
  /api/v4/projects/{id}/repository/branches/{branch}/unprotect:
    put:
      description: Unprotect a single branch
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: path
          name: branch
          description: The name of the branch
          type: string
          required: true
      responses:
        '200':
          description: Unprotect a single branch
          schema:
            $ref: '#/definitions/API_Entities_Branch'
        '404':
          description: 404 Project Not Found
      tags:
        - branches
      operationId: putApiV4ProjectsIdRepositoryBranchesBranchUnprotect
  /api/v4/projects/{id}/jobs:
    get:
      description: Get a projects jobs
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: query
          name: scope
          description: The scope of builds to show
          type: array
          items:
            type: string
            enum:
              - created
              - waiting_for_resource
              - preparing
              - waiting_for_callback
              - pending
              - running
              - success
              - failed
              - canceling
              - canceled
              - skipped
              - manual
              - scheduled
          required: false
          example:
            - pending
            - running
        - in: query
          name: ref
          description: The branch name (ref) to filter jobs by
          type: string
          required: false
          example: feature-branch
        - in: query
          name: page
          description: Current page number
          type: integer
          format: int32
          default: 1
          required: false
          example: 1
        - in: query
          name: per_page
          description: Number of items per page
          type: integer
          format: int32
          default: 20
          required: false
          example: 20
      responses:
        '200':
          description: Get a projects jobs
          schema:
            type: array
            items:
              $ref: '#/definitions/API_Entities_Ci_Job'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      tags:
        - ci_jobs
      operationId: getApiV4ProjectsIdJobs
  /api/v4/projects/{id}/jobs/{job_id}:
    get:
      description: Get a specific job of a project
      produces:
        - application/json
      parameters:
        - in: path
          name: job_id
          description: The ID of a job
          type: integer
          format: int32
          required: true
          example: 88
        - in: path
          name: id
          type: integer
          format: int32
          required: true
      responses:
        '200':
          description: Get a specific job of a project
          schema:
            $ref: '#/definitions/API_Entities_Ci_Job'
