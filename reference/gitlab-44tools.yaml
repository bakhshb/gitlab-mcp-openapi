  /api/v4/projects/{id}/issues:
    get:
      description: Get a list of project issues
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID or URL-encoded path of the project
          type: string
          required: true
        - in: query
          name: with_labels_details
          description: Return titles of labels and other details
          type: boolean
          default: false
          required: false
        - in: query
          name: state
          description: Return opened, closed, or all issues
          type: string
          default: all
          enum:
            - opened
            - closed
            - all
          required: false
        - in: query
          name: closed_by_id
          description: Return issues which were closed by the user with the given ID.
          type: integer
          format: int32
          required: false
        - in: query
          name: order_by
          description: >-
            Return issues ordered by `created_at`, `due_date`, `label_priority`, `milestone_due`, `popularity`,
            `priority`, `relative_position`, `title`, or `updated_at` fields.
          type: string
          default: created_at
          enum:
            - created_at
            - due_date
            - label_priority
            - milestone_due
            - popularity
            - priority
            - relative_position
            - title
            - updated_at
            - weight
          required: false
        - in: query
          name: sort
          description: Return issues sorted in `asc` or `desc` order.
          type: string
          default: desc
          enum:
            - asc
            - desc
          required: false
        - in: query
          name: due_date
          description: >-
            Return issues that have no due date (`0`), or whose due date is this week, this month, between two weeks ago
            and next month, or which are overdue. Accepts: `overdue`, `week`, `month`,
            `next_month_and_previous_two_weeks`, `0`
          type: string
          enum:
            - '0'
            - any
            - today
            - tomorrow
            - overdue
            - week
            - month
            - next_month_and_previous_two_weeks
            - ''
          required: false
        - in: query
          name: issue_type
          description: 'The type of the issue. Accepts: issue, incident, test_case, requirement, task, ticket'
          type: string
          enum:
            - issue
            - incident
            - test_case
            - requirement
            - task
            - ticket
          required: false
        - in: query
          name: labels
          description: Comma-separated list of label names
          type: array
          items:
            type: string
          required: false
        - in: query
          name: milestone
          description: Milestone title
          type: string
          required: false
        - in: query
          name: milestone_id
          description: >-
            Return issues assigned to milestones with the specified timebox value ("Any", "None", "Upcoming" or
            "Started")
          type: string
          enum:
            - Any
            - None
            - Upcoming
            - Started
          required: false
        - in: query
          name: iids
          description: The IID array of issues
          type: array
          items:
            type: integer
            format: int32
          required: false
        - in: query
          name: search
          description: Search issues for text present in the title, description, or any combination of these
          type: string
          required: false
        - in: query
          name: in
          description: '`title`, `description`, or a string joining them with comma'
          type: string
          required: false
        - in: query
          name: author_id
          description: Return issues which are authored by the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: author_username
          description: Return issues which are authored by the user with the given username
          type: string
          required: false
        - in: query
          name: assignee_id
          description: Return issues which are assigned to the user with the given ID
          type: integer
          format: int32
          required: false
        - in: query
          name: assignee_username
          description: Return issues which are assigned to the user with the given username
          type: array
          items:
            type: string
          required: false
        - in: query
          name: created_after
          description: Return issues created after the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: created_before
          description: Return issues created before the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: updated_after
          description: Return issues updated after the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: updated_before
          description: Return issues updated before the specified time
          type: string
          format: date-time
          required: false
        - in: query
          name: not[labels]
          description: Comma-separated list of label names
          type: array
          items:
            type: string
          required: false
        - in: query
          name: not[milestone]
